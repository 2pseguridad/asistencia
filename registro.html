<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Asistencia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f0e;
      --surface: #141715;
      --card: #1a1d1b;
      --border: #2a2e2b;
      --accent-david: #b8f07a;
      --accent-gabriel: #7ae8f0;
      --text: #e8ede9;
      --muted: #6b7569;
      --in-color: #6effa3;
      --out-color: #ff8080;
      --font-display: 'DM Serif Display', serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, #1e2b1e 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #0e1e20 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .clock-display {
      font-size: 3.5rem;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .date-display {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-top: 1.5rem;
      letter-spacing: 0.02em;
    }

    /* Cards de usuarios */
    .users-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 480px) {
      .users-grid { grid-template-columns: 1fr; }
      .clock-display { font-size: 2.8rem; }
    }

    .user-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.6s ease both;
      transition: border-color 0.3s;
    }

    .user-card:nth-child(1) { animation-delay: 0.1s; }
    .user-card:nth-child(2) { animation-delay: 0.2s; }

    .user-card.david { --user-color: var(--accent-david); }
    .user-card.gabriel { --user-color: var(--accent-gabriel); }
    .user-card:hover { border-color: var(--user-color); }

    .user-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--user-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: #0d0f0e;
      flex-shrink: 0;
    }

    .user-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--text);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      margin-left: auto;
    }

    .status-badge.out {
      background: rgba(255,128,128,0.1);
      color: var(--out-color);
      border: 1px solid rgba(255,128,128,0.2);
    }

    .status-badge.in {
      background: rgba(110,255,163,0.1);
      color: var(--in-color);
      border: 1px solid rgba(110,255,163,0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.in .status-dot {
      animation: pulse 1.5s infinite;
    }

    .last-action {
      font-size: 0.72rem;
      color: var(--muted);
      min-height: 1em;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.65rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--surface); color: var(--text); border-color: var(--text); }

    .btn.ingreso:hover {
      background: rgba(110,255,163,0.08);
      border-color: var(--in-color);
      color: var(--in-color);
    }

    .btn.egreso:hover {
      background: rgba(255,128,128,0.08);
      border-color: var(--out-color);
      color: var(--out-color);
    }

    .btn:active { transform: scale(0.97); }

    /* Historial */
    .history-section {
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-clear {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { color: var(--out-color); border-color: var(--out-color); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .history-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.78rem;
      animation: slideIn 0.3s ease;
    }

    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-dot.in { background: var(--in-color); }
    .history-dot.out { background: var(--out-color); }

    .history-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: var(--text);
      min-width: 80px;
    }

    .history-type {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex: 1;
    }

    .history-type.in { color: var(--in-color); }
    .history-type.out { color: var(--out-color); }

    .history-time {
      color: var(--muted);
      font-size: 0.7rem;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1.4rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="clock-display" id="clock">00:00:00</div>
    <div class="date-display" id="dateDisplay">—</div>
    <h1>registro de asistencia</h1>
  </header>

  <div class="users-grid">
    <!-- David -->
    <div class="user-card david" id="card-david">
      <div class="user-header">
        <div class="avatar">D</div>
        <span class="user-name">David</span>
        <span class="status-badge out" id="badge-david">
          <span class="status-dot"></span>
          <span id="badge-text-david">Fuera</span>
        </span>
      </div>
      <div class="last-action" id="last-david">Sin registros hoy</div>
      <div class="btn-group">
        <button class="btn ingreso" onclick="registrar('David', 'ingreso')">▶ Ingreso</button>
        <button class="btn egreso" onclick="registrar('David', 'egreso')">■ Egreso</button>
      </div>
    </div>

    <!-- Gabriel -->
    <div class="user-card gabriel" id="card-gabriel">
      <div class="user-header">
        <div class="avatar">G</div>
        <span class="user-name">Gabriel</span>
        <span class="status-badge out" id="badge-gabriel">
          <span class="status-dot"></span>
          <span id="badge-text-gabriel">Fuera</span>
        </span>
      </div>
      <div class="last-action" id="last-gabriel">Sin registros hoy</div>
      <div class="btn-group">
        <button class="btn ingreso" onclick="registrar('Gabriel', 'ingreso')">▶ Ingreso</button>
        <button class="btn egreso" onclick="registrar('Gabriel', 'egreso')">■ Egreso</button>
      </div>
    </div>
  </div>

  <!-- Historial -->
  <div class="history-section">
    <div class="section-header">
      <span class="section-title">Historial del día</span>
      <button class="btn-clear" onclick="limpiarHistorial()">Limpiar</button>
    </div>
    <div class="history-list" id="historial">
      <div class="empty-state" id="emptyState">Ningún registro todavía. Marcá tu ingreso para empezar.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Reloj ──────────────────────────────────────────────
  function actualizarReloj() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('es-AR', { hour12: false });

    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    document.getElementById('dateDisplay').textContent =
      `${dias[now.getDay()]}, ${now.getDate()} de ${meses[now.getMonth()]} ${now.getFullYear()}`;
  }
  actualizarReloj();
  setInterval(actualizarReloj, 1000);

  // ── Storage ────────────────────────────────────────────
  const HOY_KEY = new Date().toLocaleDateString('es-AR');

  function cargarDatos() {
    try {
      const raw = localStorage.getItem('asistencia_' + HOY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function guardarDatos(lista) {
    localStorage.setItem('asistencia_' + HOY_KEY, JSON.stringify(lista));
  }

  // ── Estado por usuario ─────────────────────────────────
  function estadoUsuario(nombre, lista) {
    const registros = lista.filter(r => r.nombre === nombre);
    if (!registros.length) return null;
    return registros[registros.length - 1].tipo;
  }

  // ── Actualizar UI de tarjetas ──────────────────────────
  function actualizarTarjeta(nombre, lista) {
    const key = nombre.toLowerCase();
    const badge = document.getElementById(`badge-${key}`);
    const badgeText = document.getElementById(`badge-text-${key}`);
    const lastEl = document.getElementById(`last-${key}`);

    const ultimo = estadoUsuario(nombre, lista);
    const registros = lista.filter(r => r.nombre === nombre);

    if (ultimo === 'ingreso') {
      badge.className = 'status-badge in';
      badgeText.textContent = 'Adentro';
    } else {
      badge.className = 'status-badge out';
      badgeText.textContent = 'Fuera';
    }

    if (registros.length) {
      const ult = registros[registros.length - 1];
      lastEl.textContent = `Último: ${ult.tipo === 'ingreso' ? 'Ingreso' : 'Egreso'} a las ${ult.hora}`;
    } else {
      lastEl.textContent = 'Sin registros hoy';
    }
  }

  // ── Renderizar historial ───────────────────────────────
  function renderHistorial(lista) {
    const cont = document.getElementById('historial');
    const empty = document.getElementById('emptyState');

    // Limpiar excepto el estado vacío
    Array.from(cont.children).forEach(el => {
      if (el.id !== 'emptyState') el.remove();
    });

    if (!lista.length) {
      empty.style.display = '';
      return;
    }

    empty.style.display = 'none';

    // Mostrar del más reciente al más viejo
    [...lista].reverse().forEach(r => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <span class="history-dot ${r.tipo === 'ingreso' ? 'in' : 'out'}"></span>
        <span class="history-name">${r.nombre}</span>
        <span class="history-type ${r.tipo === 'ingreso' ? 'in' : 'out'}">${r.tipo === 'ingreso' ? '→ Ingreso' : '← Egreso'}</span>
        <span class="history-time">${r.hora}</span>
      `;
      cont.appendChild(item);
    });
  }

  // ── Registrar ──────────────────────────────────────────
  function registrar(nombre, tipo) {
    const lista = cargarDatos();
    const ahora = new Date();
    const hora = ahora.toLocaleTimeString('es-AR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    lista.push({ nombre, tipo, hora, ts: ahora.getTime() });
    guardarDatos(lista);

    actualizarTarjeta('David', lista);
    actualizarTarjeta('Gabriel', lista);
    renderHistorial(lista);

    const emoji = tipo === 'ingreso' ? '✓' : '○';
    mostrarToast(`${emoji}  ${nombre} — ${tipo} registrado a las ${hora}`);
  }

  // ── Limpiar ────────────────────────────────────────────
  function limpiarHistorial() {
    if (!confirm('¿Borrar todos los registros del día?')) return;
    localStorage.removeItem('asistencia_' + HOY_KEY);
    const lista = [];
    actualizarTarjeta('David', lista);
    actualizarTarjeta('Gabriel', lista);
    renderHistorial(lista);
    mostrarToast('Historial del día borrado');
  }

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Init ───────────────────────────────────────────────
  (function init() {
    const lista = cargarDatos();
    actualizarTarjeta('David', lista);
    actualizarTarjeta('Gabriel', lista);
    renderHistorial(lista);
  })();
</script>
</body>
</html>
